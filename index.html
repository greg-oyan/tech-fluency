<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Fluency — The Complete Edition</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c0e;
  --bg-sidebar: #131316;
  --bg-card: #18181b;
  --bg-hover: #1e1e22;
  --border: #27272a;
  --border-light: #3f3f46;
  --text: #e4e4e7;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #818cf8;
  --accent-dim: #6366f1;
  --accent-glow: rgba(99, 102, 241, 0.15);
  --green: #4ade80;
  --green-dim: #22c55e;
  --green-glow: rgba(34, 197, 94, 0.15);
  --amber: #f59e0b;
  --amber-dim: #d97706;
  --amber-glow: rgba(245, 158, 11, 0.12);
  --red: #f87171;
  --red-dim: #ef4444;
  --red-glow: rgba(239, 68, 68, 0.15);
  --sidebar-w: 300px;
  --transition: 200ms ease;
}

html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  min-height: 100vh;
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: transform 0.3s ease;
}

.sidebar-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.sidebar-brand {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}

.sidebar-title {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

/* Progress bar in sidebar */
.progress-bar-container {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-bottom: 6px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.progress-track {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-dim), var(--accent));
  border-radius: 2px;
  transition: width 0.4s ease;
  width: 0%;
}

.progress-fill.complete {
  background: linear-gradient(90deg, var(--green-dim), var(--green));
}

/* Nav */
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.module-group { margin-bottom: 2px; }

.module-header {
  padding: 10px 20px 4px;
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
  transition: color var(--transition);
}

.module-header:hover { color: var(--text-secondary); }

.module-progress-ring {
  flex-shrink: 0;
}

.module-progress-ring circle.track {
  fill: none;
  stroke: var(--border);
  stroke-width: 2;
}

.module-progress-ring circle.fill {
  fill: none;
  stroke: var(--accent);
  stroke-width: 2;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.4s ease, stroke 0.3s ease;
  transform: rotate(-90deg);
  transform-origin: center;
}

.module-progress-ring.done circle.fill {
  stroke: var(--green);
}

.module-title-text { flex: 1; }

.module-time {
  font-size: 0.62rem;
  color: var(--text-muted);
  font-weight: 400;
  letter-spacing: 0;
  text-transform: none;
  white-space: nowrap;
}

.module-badge {
  display: none;
  color: var(--amber);
  font-size: 0.65rem;
}

.module-badge.show { display: inline; }

.module-lessons { overflow: hidden; transition: max-height 0.3s ease; }
.module-lessons.collapsed { max-height: 0 !important; }

.lesson-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 7px 20px 7px 28px;
  border: none;
  background: none;
  color: var(--text-secondary);
  font-size: 0.82rem;
  text-align: left;
  cursor: pointer;
  transition: all var(--transition);
  line-height: 1.4;
  position: relative;
}

.lesson-btn:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.lesson-btn.active {
  color: var(--text);
  background: var(--accent-glow);
}

.lesson-btn.active::before {
  content: '';
  position: absolute;
  left: 0; top: 4px; bottom: 4px;
  width: 2px;
  background: var(--accent);
  border-radius: 1px;
}

.lesson-check {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--border-light);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}

.lesson-check.done {
  border-color: var(--green);
  background: var(--green-glow);
}

.lesson-check.done::after {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
}

.lesson-label { flex: 1; }

.lesson-btn .quiz-icon,
.lesson-btn .scenario-icon {
  font-size: 0.7rem;
  opacity: 0.6;
}

/* ── Main ── */
.main {
  margin-left: var(--sidebar-w);
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Top bar (mobile) */
.topbar {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 56px;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
  align-items: center;
  padding: 0 16px;
  z-index: 90;
  gap: 12px;
}

.hamburger {
  width: 36px;
  height: 36px;
  border: none;
  background: none;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
}

.hamburger:hover { background: var(--bg-hover); }
.hamburger svg { width: 20px; height: 20px; }

.topbar-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
  flex: 1;
}

.topbar-progress {
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 600;
}

/* Overlay */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 95;
}

.overlay.show { display: block; }

/* Content area */
.content-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 72px 64px 96px;
  display: flex;
  justify-content: center;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.content-scroll::-webkit-scrollbar { width: 6px; }
.content-scroll::-webkit-scrollbar-track { background: transparent; }
.content-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.content {
  max-width: 680px;
  width: 100%;
}

/* Lesson content */
.lesson-content {
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}

.lesson-content.visible {
  opacity: 1;
  transform: translateY(0);
}

.lesson-module-label {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 10px;
}

.lesson-title {
  font-size: 2.15rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.25;
  margin-bottom: 40px;
  letter-spacing: -0.025em;
}

.lesson-body p {
  color: var(--text-secondary);
  margin-bottom: 28px;
  font-size: 1.08rem;
  line-height: 1.8;
}

.lesson-body p:last-child { margin-bottom: 0; }

.lesson-body strong {
  color: var(--text);
  font-weight: 600;
}

.lesson-body em {
  color: var(--accent);
  font-style: normal;
  font-weight: 500;
}

.lesson-body code {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  background: var(--bg-hover);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.85em;
  color: var(--accent);
}

/* Callout boxes */
.callout {
  background: var(--bg-card);
  border-left: 3px solid var(--accent-dim);
  padding: 20px 24px;
  margin: 32px 0;
  border-radius: 0 8px 8px 0;
  font-size: 1.02rem;
  color: var(--text-secondary);
  line-height: 1.75;
}

.callout strong { color: var(--text); }

.callout.tip {
  border-left-color: var(--green-dim);
}

/* Quiz styles */
.quiz-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  margin: 32px 0;
}

.quiz-card h3 {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 20px;
}

.quiz-question {
  margin-bottom: 32px;
}

.quiz-question:last-child { margin-bottom: 0; }

.quiz-question p {
  font-size: 1.02rem;
  color: var(--text-secondary);
  margin-bottom: 14px;
  line-height: 1.7;
}

.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.quiz-option {
  padding: 12px 16px;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-secondary);
  font-size: 0.95rem;
  cursor: pointer;
  transition: all var(--transition);
  text-align: left;
  line-height: 1.5;
}

.quiz-option:hover:not(.selected) {
  border-color: var(--accent-dim);
  color: var(--text);
}

.quiz-option.correct {
  border-color: var(--green-dim);
  background: var(--green-glow);
  color: var(--green);
  cursor: default;
  animation: correctPulse 0.4s ease;
}

.quiz-option.incorrect {
  border-color: var(--red-dim);
  background: var(--red-glow);
  color: var(--red);
  cursor: default;
  animation: shake 0.4s ease;
}

.quiz-option.revealed {
  opacity: 0.5;
  cursor: default;
}

.quiz-option.revealed.correct {
  opacity: 1;
  border-color: var(--green-dim);
  background: var(--green-glow);
  color: var(--green);
}

.quiz-explanation {
  margin-top: 12px;
  padding: 12px 16px;
  background: var(--bg);
  border-radius: 8px;
  font-size: 0.9rem;
  color: var(--text-muted);
  line-height: 1.6;
  display: none;
}

.quiz-explanation.show { display: block; }

@keyframes correctPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* Scenario styles */
.scenario-card {
  background: linear-gradient(135deg, rgba(245,158,11,0.06), rgba(245,158,11,0.02));
  border-left: 3px solid var(--amber-dim);
  border-radius: 0 12px 12px 0;
  padding: 28px 28px;
  margin: 32px 0;
}

.scenario-card h3 {
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--amber);
  margin-bottom: 16px;
}

.scenario-card .scenario-situation {
  font-size: 1.02rem;
  color: var(--text-secondary);
  margin-bottom: 20px;
  line-height: 1.75;
}

.scenario-card .scenario-prompt {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
}

.scenario-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.scenario-option {
  padding: 12px 16px;
  background: rgba(245,158,11,0.05);
  border: 1px solid rgba(245,158,11,0.15);
  border-radius: 8px;
  color: var(--text-secondary);
  font-size: 0.95rem;
  cursor: pointer;
  transition: all var(--transition);
  text-align: left;
  line-height: 1.5;
}

.scenario-option:hover:not(.selected) {
  border-color: var(--amber-dim);
  color: var(--text);
}

.scenario-option.selected {
  border-color: var(--amber);
  background: var(--amber-glow);
  color: var(--amber);
  cursor: default;
}

.scenario-option.revealed {
  opacity: 0.5;
  cursor: default;
}

.scenario-explanation {
  margin-top: 16px;
  padding: 16px;
  background: var(--bg-card);
  border-radius: 8px;
  font-size: 0.92rem;
  color: var(--text-secondary);
  line-height: 1.7;
  display: none;
}

.scenario-explanation.show { display: block; }
.scenario-explanation strong { color: var(--text); }

/* Actions */
.lesson-actions {
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.btn-complete {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 11px 22px;
  border-radius: 8px;
  border: 1px solid var(--border-light);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}

.btn-complete:hover {
  border-color: var(--accent-dim);
  color: var(--text);
  background: var(--accent-glow);
}

.btn-complete.done {
  border-color: var(--green-dim);
  color: var(--green);
  background: var(--green-glow);
}

.btn-complete svg {
  width: 16px;
  height: 16px;
}

.btn-nav {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 11px 18px;
  border: none;
  border-radius: 8px;
  background: none;
  color: var(--text-muted);
  font-size: 0.88rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}

.btn-nav:hover {
  color: var(--text);
  background: var(--bg-hover);
}

.btn-nav.primary {
  background: var(--accent-dim);
  color: #fff;
}

.btn-nav.primary:hover {
  background: var(--accent);
}

.nav-group {
  display: flex;
  gap: 4px;
}

/* Landing page */
.landing { text-align: center; padding-top: 10vh; }

.landing-icon {
  font-size: 2.5rem;
  margin-bottom: 24px;
  opacity: 0.8;
}

.landing h1 {
  font-size: 2.5rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  margin-bottom: 16px;
}

.landing p {
  color: var(--text-secondary);
  max-width: 520px;
  margin: 0 auto 36px;
  font-size: 1.1rem;
  line-height: 1.7;
}

.landing .btn-nav.primary {
  padding: 14px 32px;
  font-size: 0.95rem;
}

.landing-stats {
  display: flex;
  justify-content: center;
  gap: 36px;
  margin-top: 40px;
  color: var(--text-muted);
  font-size: 0.85rem;
}

.landing-stats span { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.landing-stats strong { color: var(--text-secondary); font-size: 1.3rem; }

/* Completion screen */
.completion {
  text-align: center;
  padding-top: 12vh;
}

.completion-icon {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--green-glow);
  border: 2px solid var(--green-dim);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
}

.completion-icon svg { color: var(--green); width: 28px; height: 28px; }

.completion h1 {
  font-size: 2.15rem;
  font-weight: 700;
  margin-bottom: 16px;
}

.completion p {
  color: var(--text-secondary);
  max-width: 540px;
  margin: 0 auto 16px;
  font-size: 1.1rem;
  line-height: 1.7;
}

.completion .btn-nav {
  margin-top: 24px;
}

kbd {
  display: inline-block;
  padding: 2px 6px;
  font-size: 0.72rem;
  font-family: inherit;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-muted);
  margin-left: 4px;
  vertical-align: middle;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
    width: 280px;
  }
  .sidebar.open { transform: translateX(0); }

  .topbar { display: flex; }

  .main {
    margin-left: 0;
    padding-top: 56px;
  }

  .content-scroll {
    padding: 28px 20px 120px;
  }

  .lesson-title {
    font-size: 1.5rem;
    margin-bottom: 28px;
  }

  .lesson-body p {
    font-size: 1rem;
  }

  .lesson-actions {
    flex-wrap: wrap;
  }

  .landing h1 { font-size: 1.7rem; }
  .landing p { font-size: 1rem; }
  .landing-stats { gap: 24px; }
  .landing-stats strong { font-size: 1.1rem; }
}

@media (max-width: 480px) {
  .content-scroll {
    padding: 20px 16px 140px;
  }

  .quiz-card { padding: 20px 16px; }
  .scenario-card { padding: 20px 16px; }
}
</style>

<script>
// ═══════════════════════════════════════════════════════
// DATA: All modules, lessons, quizzes, and scenarios
// ═══════════════════════════════════════════════════════

const MODULES = [
// ─── MODULE 1 ───
{
  id: 1, title: "What Software Actually Is", time: "15 min",
  lessons: [
    { id: "1.1", title: "Software is state + logic + interface", body: `
<p>Every piece of software does three things: it <strong>remembers things</strong> (state), <strong>makes decisions</strong> (logic), and <strong>shows you something</strong> (interface). That's the whole game. Every app you've ever used — from a banking app to a video game to a spreadsheet — is doing some combination of those three things, over and over, very fast.</p>
<p><strong>State</strong> is what the software knows right now. Your shopping cart has 3 items in it. You're logged in. The document has 4 pages. A game character has 75 health points. State is the current snapshot of all the data the software is tracking. When you close an app and reopen it, the state that was saved to a database comes back. The state that wasn't saved is gone.</p>
<p><strong>Logic</strong> is the rules. If the cart total exceeds $50, apply free shipping. If the password is wrong three times, lock the account. If the character's health hits 0, game over. Logic is every if/then/else decision the software makes, millions of times per second. The complexity of software comes almost entirely from the sheer number of these rules and how they interact with each other.</p>
<p><strong>Interface</strong> is what you see and touch. Buttons, text fields, charts, notifications, error messages. The interface translates state into something visual and translates your actions back into changes to the state. You click "Add to Cart" (interface) → the cart gains an item (state change) → the cart icon updates to show "4" (interface reflects new state).</p>
<div class="callout">
<strong>Key principle:</strong> Every software feature you've ever used, requested, or complained about is ultimately about state (what data?), logic (what rules?), or interface (what does the user see/do?). When you describe a feature request in these terms, engineers immediately understand what you need.
</div>` },
    { id: "1.2", title: "Frontend vs backend", body: `
<p>The <strong>frontend</strong> is everything that runs on your device — the web page in your browser, the app on your phone. It's what you see, tap, scroll, and interact with. The frontend is responsible for layout, animations, form fields, buttons, and making everything look and feel right.</p>
<p>The <strong>backend</strong> is everything that runs on a server somewhere else. It handles the heavy lifting: storing data in databases, processing business logic, authenticating users, sending emails, talking to other services. When you log in, the frontend sends your credentials to the backend, the backend checks them against the database, and if they match, it sends back a "yes, you're in" along with your account data.</p>
<p>They communicate through <strong>APIs</strong> (Application Programming Interfaces) — structured messages sent over the internet. The frontend says "give me this user's order history," the backend queries the database and sends back the data, and the frontend displays it. This separation means the frontend and backend can be built by different teams, using different programming languages, and can change independently — as long as they agree on the API contract between them.</p>
<p>This is why you'll sometimes hear "it's a frontend issue" or "it's a backend issue." If a button doesn't look right, that's frontend. If clicking that button returns the wrong data, that's backend. If clicking that button does nothing, it could be either — maybe the frontend isn't sending the request correctly, or maybe the backend isn't responding.</p>
<div class="callout">
<strong>Key principle:</strong> Frontend = what you see. Backend = what you don't see. API = how they talk. This separation is fundamental to how all modern software is built.
</div>` },
    { id: "1.3", title: "What web apps actually are", body: `
<p>A <strong>web application</strong> is software that runs in your browser. Gmail, Figma, Notion, Google Docs, Slack's web version — these are all web apps. They look and feel like "real" programs, but they're built with web technologies and delivered through a URL.</p>
<p>When you visit a web app, your browser downloads HTML (the structure), CSS (the styling), and JavaScript (the behavior). JavaScript is doing the heavy lifting — it's a full programming language running inside your browser, capable of building complex, interactive interfaces. Modern web apps use JavaScript frameworks like React, Vue, or Angular to manage complex interfaces with many moving parts.</p>
<p>A <strong>native app</strong> is software built specifically for one platform — an iOS app written in Swift, an Android app written in Kotlin, a Windows app written in C#. Native apps can access device features more deeply (camera, GPS, push notifications) and often feel faster and smoother. The trade-off is that you have to build and maintain separate versions for each platform.</p>
<p><strong>Hybrid apps</strong> split the difference. They're web apps wrapped in a native container, so they can be distributed through app stores and access some device features. Many apps you think are "native" are actually hybrid — built with web technologies but packaged to look like native apps.</p>
<div class="callout">
<strong>Key principle:</strong> Most modern software you interact with daily is a web app. The browser has become the operating system for most business software. When someone says "we're building a web app," they mean software delivered through the browser, built with HTML/CSS/JavaScript.
</div>` },
    { id: "1.4", title: "HTML, CSS, and JavaScript in plain English", body: `
<p>Every web page you've ever visited is built with three technologies. They always work together, and understanding their roles takes about two minutes.</p>
<p><strong>HTML</strong> (HyperText Markup Language) is the skeleton. It defines what's on the page: headings, paragraphs, images, buttons, links, forms, tables. HTML is purely structural — it says "there's a heading here, a paragraph there, a button below that." It doesn't say anything about what those things look like or what happens when you interact with them. If you stripped a web page down to just its HTML, you'd see plain text and images in a single column — ugly but functional.</p>
<p><strong>CSS</strong> (Cascading Style Sheets) is the skin and clothing. It controls how things look: colors, fonts, sizes, spacing, layout, animations, backgrounds. CSS takes the raw HTML skeleton and makes it look like something. A blue button, a two-column layout, rounded corners, a shadow under a card, text that's 16px and dark grey — all CSS. This is why websites can have "dark mode" — the HTML stays the same, but the CSS swaps out the color values. When someone says "it's a styling issue," they usually mean CSS.</p>
<p><strong>JavaScript</strong> is the nervous system and muscles. It handles behavior — what happens when you click, type, scroll, hover, or wait. JavaScript makes things interactive. A dropdown menu that opens on click, a form that validates your email before you submit, a chart that updates in real time, a chat interface that sends and receives messages — all JavaScript. Without JavaScript, web pages would be static documents. With it, they become applications.</p>
<div class="callout tip">
<strong>Quick test:</strong> If something looks wrong (wrong color, bad spacing, text too small), it's probably CSS. If something doesn't work (button does nothing, page doesn't load data), it's probably JavaScript. If something is missing or in the wrong place structurally, it might be HTML. This simple diagnostic will serve you well.
</div>` }
  ],

    situation: `You're in a meeting with a designer and a developer. The designer shows a mockup of a new dashboard. The developer says "the data is already available through the API — it's mostly a frontend build." The designer asks for some animations on the charts. The developer hesitates and says "that depends on the library we use."`,

      },

  lessons: [
    { id: "2.1", title: "Git and GitHub", body: `
<p><strong>Git</strong> is a version control system — software that tracks every change to every file in a project. Think of it as an unlimited undo history for an entire codebase. Every time a developer makes a meaningful change, they create a <strong>commit</strong> — a snapshot of all the files at that moment, with a message describing what changed and why. The project's history is a chain of these commits, and you can go back to any point in that chain.</p>
<p><strong>GitHub</strong> is a platform that hosts Git repositories (projects) online and adds collaboration features. It's where teams share code, review each other's work, track bugs, and coordinate development. Almost every software company uses GitHub (or similar platforms like GitLab or Bitbucket). When a developer says "check the repo," they mean look at the project on GitHub.</p>
<p>The killer feature is <strong>branching</strong>. A branch is a parallel copy of the codebase where a developer can make changes without affecting the main version. You create a branch, build your feature, test it, and when it's ready, you <strong>merge</strong> it back into the main branch. If the feature doesn't work out, you delete the branch and the main codebase is untouched. This is how teams of developers can work on different features simultaneously without stepping on each other's toes.</p>
<p>A <strong>pull request</strong> (PR) is a formal request to merge a branch into the main codebase. It shows exactly what changed, line by line, and other developers review it before approving. This code review process catches bugs, ensures quality, and spreads knowledge across the team. When someone says "I'll put up a PR," they mean they'll submit their changes for review.</p>
<div class="callout">
<strong>Key principle:</strong> Git gives developers a safety net and a collaboration system. Nothing goes live without being committed, reviewed, and merged. When someone says "it's in the PR," the feature is built but hasn't been reviewed and approved yet. When they say "it's merged," it's been approved and is part of the official codebase.
</div>` },
    { id: "2.2", title: "Environments: dev, staging, production", body: `
<p>Software runs in different <strong>environments</strong> — separate copies of the system used for different purposes. Understanding this concept prevents a shocking number of miscommunications.</p>
<p><strong>Development (dev)</strong> is the developer's local machine. This is where code gets written and tested initially. It's messy, things break constantly, and that's fine — it's a sandbox. When a developer says "it works on my machine," they mean it works in dev but might not work anywhere else.</p>
<p><strong>Staging</strong> is a copy of the production system used for final testing before release. It has realistic data (often a copy of production data, scrubbed of sensitive information) and mirrors the production setup as closely as possible. When a PM says "can you test this in staging?" they mean verify the feature works in a production-like environment before real users see it.</p>
<p><strong>Production (prod)</strong> is the live system that real users interact with. Production is sacred. Changes to production are carefully controlled because bugs in production affect real users, real revenue, and real reputation. When someone says "it's in production" or "it's live," they mean real users can see and use it right now.</p>
<p>The typical flow: code is written in dev → pushed to GitHub → reviewed in a PR → merged → automatically deployed to staging → tested → promoted to production. This process is called the <strong>deployment pipeline</strong>, and it can be highly automated (code reaches production minutes after merging) or heavily gated (requiring manual approvals at each step).</p>
<div class="callout">
<strong>Key principle:</strong> The question "which environment?" resolves half of all "it's broken" conversations. Something working in staging but broken in production (or vice versa) tells you exactly where to investigate.
</div>` },
    { id: "2.3", title: "CI/CD and deployment", body: `
<p><strong>CI/CD</strong> stands for Continuous Integration / Continuous Deployment. It's the automated pipeline that takes code from "a developer wrote it" to "users can see it."</p>
<p><strong>Continuous Integration (CI)</strong> means that every time a developer pushes code, automated checks run: the code compiles, tests pass, code quality standards are met. If any check fails, the developer is notified immediately. This catches problems early — within minutes of the code being written — rather than days or weeks later when they're harder to fix and more expensive to debug.</p>
<p><strong>Continuous Deployment (CD)</strong> means that code that passes all checks is automatically deployed to production. Not every team does full CD — many have a manual approval step between "all checks pass" and "goes to production." But the trend is toward more automation, because manual steps are slow, error-prone, and create bottlenecks.</p>
<p>The alternative to CI/CD is "big bang" releases: accumulate weeks or months of changes, then deploy everything at once. This is risky because if something breaks, you have to figure out which of hundreds of changes caused the problem. CI/CD prefers small, frequent deployments — each one is less risky, easier to debug, and faster to roll back if something goes wrong.</p>
<p>A <strong>rollback</strong> is reverting to the previous version of the software if the new deployment causes problems. Good deployment systems make rollbacks fast and easy — often a single button click. This is why "we can always roll back" is a reassuring phrase in deployment conversations.</p>
<div class="callout">
<strong>Key principle:</strong> CI/CD turns deployment from a stressful event into a routine process. Small, frequent, automated deployments are safer than big, rare, manual ones. If your team deploys often (multiple times per day), that's usually a sign of a mature engineering practice, not recklessness.
</div>` },
    { id: "2.4", title: "Testing: unit, integration, end-to-end", body: `
<p>Testing is how teams verify that software works correctly — not just today, but after every future change. There are three main levels of testing, and understanding them helps you understand why "just test it" isn't as simple as it sounds.</p>
<p><strong>Unit tests</strong> test individual functions in isolation. "Does this function correctly calculate sales tax?" A unit test gives it known inputs and checks that the output is correct. Unit tests are fast (thousands can run in seconds), cheap to write, and catch bugs at the smallest level. But they don't catch problems that only appear when components interact.</p>
<p><strong>Integration tests</strong> test how components work together. "When the frontend sends a checkout request to the backend, does the backend correctly process the payment and update the order database?" Integration tests catch the bugs that live in the gaps between components — the miscommunications, the incorrect assumptions about data formats, the timing issues.</p>
<p><strong>End-to-end (E2E) tests</strong> simulate a real user interacting with the complete system. "Open the browser, log in, add an item to the cart, checkout, and verify the confirmation email arrives." E2E tests catch the bugs that only appear in the full system — but they're slow, expensive to maintain, and fragile (they break when the UI changes even if the functionality is fine).</p>
<p>The common wisdom is the <strong>testing pyramid</strong>: many unit tests at the base, fewer integration tests in the middle, and a small number of E2E tests at the top. When a developer says "we need more test coverage," they mean too much of the code isn't being tested automatically, which means changes are risky.</p>
<div class="callout">
<strong>Key principle:</strong> Automated tests are a safety net that lets teams move fast without breaking things. The question "is this tested?" is one of the most important questions you can ask about any feature or bug fix.
</div>` }
  ],
  scenario: {
    situation: `A developer says "I'll put up a PR this afternoon." The product manager asks "So it'll be live today?" The developer looks uncomfortable.`,

  },

// ─── MODULE 3 ───
{
  id: 3, title: "The Stuff That Makes It Hard", time: "15 min",
  lessons: [
    { id: "3.1", title: "APIs — how systems talk to each other", body: `
<p>An <strong>API</strong> (Application Programming Interface) is a structured way for one piece of software to request something from another piece of software. That's it. It's a contract: "If you send me a request in this format, I'll send you a response in that format."</p>
<p>When you check the weather on your phone, the weather app doesn't have a thermometer. It sends a request to a weather service's API: "What's the weather in San Diego?" The API responds with structured data: temperature, humidity, wind speed, forecast. The app then displays that data in a pretty interface. The API is the middleman between the app you see and the data it needs.</p>
<p>APIs are everywhere. When you pay with a credit card online, the store's website talks to a payment API (Stripe, Square, etc.). When you sign in with Google on a third-party site, that site talks to Google's authentication API. When a company's internal tools pull sales data from Salesforce, that's Salesforce's API. Modern software is built by stitching together dozens of APIs, each handling a specific function.</p>
<p>The most common type is a <strong>REST API</strong>, which uses standard web requests (the same technology your browser uses to load web pages). You send a request to a URL (called an <strong>endpoint</strong>) with specific parameters, and you get back data, usually in a format called JSON. JSON looks like this: <code>{"temperature": 72, "condition": "sunny"}</code>. It's human-readable and machine-parseable, which is why it became the lingua franca of the internet.</p>
<p>When APIs break or change, the software that depends on them breaks too. This is why "breaking changes" to an API are a big deal — if Stripe changes how their payment API works, every company that uses Stripe has to update their code. API versioning, documentation, and deprecation policies exist to manage this dependency chain.</p>
<div class="callout">
<strong>Key principle:</strong> APIs are contracts between systems. Modern software is really a constellation of APIs working together. When someone says "we need to integrate with their API," they mean "we need to write code that talks to their system in the format they expect."
</div>` },
    { id: "3.2", title: "Databases and persistence", body: `
<p>When you close an app and reopen it later, your data is still there. That's not magic — it's a <strong>database</strong>. A database is a structured system for storing, organizing, and retrieving data. It's where the state lives permanently.</p>
<p>The most common type is a <strong>relational database</strong> (PostgreSQL, MySQL, SQL Server). Think of it as a collection of interconnected spreadsheets. Each table has rows and columns, and tables can reference each other. A "users" table has one row per user. An "orders" table has one row per order, with a column that references which user placed it. The language for talking to relational databases is called <strong>SQL</strong> (Structured Query Language) — it lets you ask questions like "show me all orders over $100 from the last 30 days" or "which users signed up but never made a purchase?"</p>
<p><strong>NoSQL databases</strong> (MongoDB, DynamoDB, Redis) store data differently — as documents, key-value pairs, or graphs instead of rigid tables. They're more flexible and often faster for certain use cases, but they sacrifice some of the structure and querying power of relational databases. The choice between SQL and NoSQL is one of those architectural decisions that's easy to make and hard to change later.</p>
<p>Every time you interact with an app — posting a comment, updating your profile, adding an item to your cart — the backend writes something to the database. Every time the app shows you information — your order history, your friend list, your dashboard — the backend reads from the database. The performance of these reads and writes is often the bottleneck that determines how fast the app feels.</p>
<p>Database problems are some of the hardest issues in software. Data can become inconsistent (two records that should match but don't). Queries can be slow (scanning millions of rows to find one result). Migrations — changing the structure of a database that already has data in it — are like performing surgery on a patient who can't stop running. They're necessary but terrifying.</p>
<div class="callout">
<strong>Key principle:</strong> The database is the source of truth. When someone says "the data is wrong," the database is where the investigation starts. When someone says "the app is slow," the database is often where the bottleneck lives.
</div>` },
    { id: "3.3", title: "Permissions and edge cases", body: `
<p>The real difficulty in software isn't building the happy path — it's handling everything that can go wrong. <strong>Edge cases</strong> are the unusual, unexpected, or extreme situations that users encounter. And they will encounter them, reliably, every time.</p>
<p>Consider a simple form that asks for a name. What happens if someone enters a single character? A 500-character name? A name with an apostrophe (O'Brien)? A name with Unicode characters? An empty string? A name that's also valid HTML code (which could break your page)? Each of these is an edge case. Individually they're trivial. Collectively, they represent an enormous amount of the work in software development.</p>
<p><strong>Permissions</strong> add another layer of complexity. Who can see what? Who can edit what? Can a manager view their team's data? Can they view other teams' data? What if someone is on two teams? What if they were on a team last month but aren't anymore — can they still see historical data? Every permission rule creates branching logic, and the interactions between rules create exponential complexity. A system with 10 permission rules might have hundreds of possible permission states.</p>
<p>This is why "just add a feature" is almost never simple. The feature itself might take a day to build. But handling all the edge cases — what if the user isn't logged in, what if they don't have permission, what if the data doesn't exist, what if two people try to do the same thing at the same time, what if the network drops halfway through — can take a week. The visible feature is the tip of the iceberg. The invisible handling of everything that can go wrong is the mass below the waterline.</p>
<div class="callout">
<strong>Key principle:</strong> Most of the work in software is handling the cases that aren't the happy path. When a developer says "it's more complex than it looks," they're usually referring to the edge cases and permission logic that aren't visible in the feature description.
</div>` },
    { id: "3.4", title: "Technical debt and why 'just fix it' isn't simple", body: `
<p><strong>Technical debt</strong> is the accumulated cost of shortcuts, workarounds, and quick fixes that were made to ship faster. Just like financial debt, it compounds over time. A shortcut that saved a week today might cost a month of rework next year.</p>
<p>Technical debt isn't always bad. Sometimes the right business decision is to ship fast and clean up later. A startup racing to get their product to market before funding runs out should absolutely take on technical debt — if the company doesn't survive, clean code is worthless. The problem is when the "clean up later" never happens, and the debt accumulates until every change becomes agonizingly slow and risky.</p>
<p>Common forms of technical debt include: code that nobody on the current team wrote or understands ("legacy code"), systems that rely on outdated libraries or frameworks, duplicated logic that exists in multiple places and has to be updated everywhere, hardcoded values that should be configurable, and missing tests that mean nobody can confidently change anything without breaking something else.</p>
<p>When someone says "we need to refactor," they mean they need to restructure existing code without changing what it does — reorganizing the internals to make future changes easier. Refactoring doesn't produce visible new features, which makes it a hard sell in product meetings. But without it, the codebase gradually becomes a minefield where every new feature risks breaking three old ones.</p>
<p>The phrase "just fix it" is the bane of every engineer's existence. In a system with significant technical debt, there is no "just." Fixing one thing touches five other things. Each of those touches creates potential breakage in systems you didn't even know were connected. The responsible answer is often "we can fix it, but we need to also fix these three related things or we'll create a worse problem," and that responsible answer sounds like an excuse to someone who doesn't understand the codebase.</p>
<div class="callout">
<strong>Key principle:</strong> Technical debt is real and it has real costs. When the engineering team says "we need to slow down and pay down debt," they're trying to protect the team's future velocity. Ignoring them is like ignoring credit card statements — it feels free until it doesn't.
</div>` }
  ],
  scenario: {
    situation: `You're in a product meeting. The PM wants to add a "share via link" feature to the dashboard. A developer says "that's at least two weeks." The PM says "it's just a link — how can it be two weeks?" The developer starts listing edge cases: permissions (who can see shared links?), expiration (do links expire?), analytics (do we track who clicks?), authentication (can non-users access shared content?), revocation (can you un-share something?).`,
    prompt: "What's the best response?",
    options: [
      { text: "Side with the PM — it really should be simpler than two weeks", id: "a" },
      { text: "Ask the developer which of those edge cases are must-haves for v1 and which can wait", id: "b", correct: true },
      { text: "Tell the developer to just build the basic version without those concerns", id: "c" },
      { text: "Table the discussion until you can get a more detailed estimate", id: "d" }
    ],
    explanation: `The developer is right that all those concerns are real. The PM is right that shipping something is better than shipping nothing. The productive move is scoping: which edge cases are critical for launch (probably permissions and authentication) and which can be v2 (analytics, expiration, revocation)? This is how experienced leaders navigate the tension between "ship fast" and "build it right."`
  },
  quiz: {
    questions: [
      {
        q: `A developer says "we need to migrate the database." What does this mean?`,
        options: [
          "Move the database to a different server",
          "Change the structure of the database (add/remove/modify tables or columns) while preserving existing data",
          "Delete old data to make room for new data",
          "Switch from one database vendor to another"
        ],

        explanation: "Database migrations change the schema (structure) while keeping the data intact. It's delicate because the database is live and serving users while you're modifying it."
      },
      {
        q: "What is technical debt?",
        options: [
          "The cost of servers and cloud infrastructure",
          "Money owed to technology vendors",
          "The accumulated cost of shortcuts and workarounds that make future changes harder",
          "The budget allocated for fixing bugs"
        ],
