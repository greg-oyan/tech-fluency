      }
    ]
  }
},

// ─── MODULE 4 ───
{
  id: 4, title: "Data — The Real Foundation", time: "20 min",
  lessons: [
    { id: "4.1", title: "SQL and relational databases — deeper dive", body: `
<p>SQL (Structured Query Language) is the language you use to talk to relational databases. It reads almost like English, which is why it's one of the most accessible technical skills for nontechnical people to pick up.</p>
<p>A SQL query looks like this: <code>SELECT name, email FROM users WHERE signup_date > '2025-01-01' ORDER BY name</code>. Translation: "Give me the name and email of every user who signed up after January 1st, 2025, sorted alphabetically by name." That's it. You're asking a question and the database gives you the answer.</p>
<p>The fundamental operations in SQL are often called <strong>CRUD</strong>: Create (INSERT), Read (SELECT), Update (UPDATE), Delete (DELETE). Every app with a database does some combination of these constantly. When you sign up for a service, that's an INSERT. When you view your profile, that's a SELECT. When you change your password, that's an UPDATE. When you delete your account, that's a DELETE.</p>
<p>The real power of relational databases is the <strong>relational</strong> part — connecting data across tables. A JOIN lets you combine data from two tables based on a shared column. "Show me all orders with their customer names" requires joining the orders table to the customers table. Complex queries might join five or six tables together. When someone says "it's a query performance issue," they often mean a JOIN across large tables is taking too long.</p>
<p><strong>Indexes</strong> are the other concept worth knowing. An index is like the index in the back of a textbook — it lets the database find rows quickly without scanning the entire table. Without an index, finding one user in a table of 10 million means checking all 10 million rows. With an index on the email column, it's nearly instant. But indexes have a cost: they slow down writes (because the index has to be updated too) and use disk space. Choosing which columns to index is a real engineering decision.</p>
<div class="callout">
<strong>Key principle:</strong> SQL is the most widely useful technical skill a nontechnical person can learn. You don't need to be an expert — just understanding SELECT, WHERE, JOIN, and GROUP BY lets you ask your own questions of the data instead of waiting for someone else to pull reports for you.
</div>` },
    { id: "4.2", title: "NoSQL, document stores, and when to use what", body: `
<p>Not all data fits neatly into rows and columns. A user's profile might have a varying number of addresses, phone numbers, and social links. A product catalog might have completely different attributes for shoes vs. electronics vs. groceries. Forcing this kind of variable data into rigid tables creates ugly workarounds.</p>
<p><strong>NoSQL databases</strong> solve this by storing data as flexible <strong>documents</strong> (usually JSON) instead of fixed rows. MongoDB is the most popular example. A document for a user might look like: <code>{"name": "Greg", "emails": ["greg@work.com", "greg@personal.com"], "preferences": {"theme": "dark"}}</code>. Each document can have different fields. No rigid schema required.</p>
<p><strong>Key-value stores</strong> (Redis, DynamoDB) are even simpler — they're like giant dictionaries. You store a value under a key, and you retrieve it by that key. Extremely fast, extremely simple, but you can't easily search or query across values. They're perfect for caching (storing frequently-accessed data in memory for speed), session data, and real-time counters.</p>
<p><strong>Graph databases</strong> (Neo4j) store data as nodes and relationships, making them ideal for social networks, recommendation engines, and fraud detection — anywhere the connections between data points matter as much as the data points themselves.</p>
<p>The choice between SQL and NoSQL isn't about one being "better." It's about trade-offs. SQL gives you strong consistency, powerful querying, and well-understood patterns — but it's rigid and can be slow at massive scale. NoSQL gives you flexibility and horizontal scaling — but you lose some querying power and have to handle consistency yourself. Most large systems use both: a relational database for core business data and a NoSQL store for specific use cases.</p>
<div class="callout">
<strong>Key principle:</strong> Different data shapes call for different databases. When someone says "we're using Postgres for the core data and Redis for caching," they're making a pragmatic architectural decision to use the right tool for each job.
</div>` },
    { id: "4.3", title: "Data lakes, data warehouses, and the analytics stack", body: `
<p>When a company grows, its data ends up scattered across dozens of systems — the product database, the payment processor, the email marketing tool, the CRM, the analytics platform, the ad network. Each system has its own slice of the truth. To understand the full picture, you need to pull all that data into one place. That's where <strong>data warehouses</strong> and <strong>data lakes</strong> come in.</p>
<p>A <strong>data warehouse</strong> (Snowflake, BigQuery, Redshift) is a centralized database optimized for analytical queries — not for running your product, but for answering business questions. "What's our revenue by region by month?" "Which marketing channel has the best conversion rate?" "What's the average customer lifetime value?" These are warehouse questions. The data is cleaned, structured, and organized into a format that makes analysis fast and consistent.</p>
<p>A <strong>data lake</strong> (S3, Azure Data Lake, Google Cloud Storage) is a more raw approach. Instead of cleaning and structuring the data upfront, you dump everything — structured, semi-structured, and unstructured — into cheap storage and figure out how to use it later. Raw log files, JSON blobs, CSV exports, images, video metadata — it all goes in the lake. The advantage is flexibility: you never throw data away. The disadvantage is that without discipline, a data lake becomes a <strong>data swamp</strong> — a disorganized mess where nobody can find anything.</p>
<p>The modern analytics stack typically looks like this: data sources → <strong>ETL/ELT pipeline</strong> (tools like Fivetran, dbt, Airflow that extract, transform, and load data) → data warehouse → <strong>BI tools</strong> (Tableau, Looker, Mode) where business users can build dashboards and reports. This pipeline is often called the "data stack" and there are entire teams dedicated to building and maintaining it.</p>
<div class="callout">
<strong>Key principle:</strong> A data warehouse is for structured analytical queries. A data lake is for storing everything in raw form. Most companies need some version of both. The pipeline that moves and transforms data between systems is often more complex and fragile than the product itself.
</div>` },
    { id: "4.4", title: "Data pipelines, ETL, and why 'just pull the data' isn't simple", body: `
<p>If you've ever asked an analyst "can you just pull the data on X?" and been told it'll take three days, the reason is almost always the <strong>data pipeline</strong>.</p>
<p><strong>ETL</strong> stands for Extract, Transform, Load. Extract data from source systems (your product database, Salesforce, Google Analytics, etc.). Transform it — clean it up, standardize formats, join related data, calculate derived metrics, handle missing values. Load it into the warehouse where it can be queried. Every step can fail. The source system's API might change. The data format might be inconsistent. A null value might break the transformation. A schema change in the warehouse might invalidate existing queries.</p>
<p>Modern teams often use <strong>ELT</strong> instead — Extract, Load, Transform — where you dump raw data into the warehouse first and transform it there, using tools like <strong>dbt</strong> (data build tool). dbt has become enormously popular because it lets analysts write transformations in SQL (which they already know) rather than requiring engineers to write Python scripts.</p>
<p>Data pipelines run on <strong>schedules</strong> — often hourly or daily. This means the data in your warehouse is never perfectly real-time. When you look at a dashboard that says "revenue today," it might actually be "revenue as of the last pipeline run two hours ago." Understanding this lag is important for making decisions — especially time-sensitive ones.</p>
<p>The hardest part of data work isn't running queries. It's <strong>data quality</strong>. Is this metric calculated the same way everywhere? Is the timestamp in UTC or local time? Are these two "customer_id" columns from different systems referring to the same customers? When your marketing team says "we had 10,000 signups" and your product team says "we had 8,000 signups," the discrepancy is almost certainly a data pipeline or definition issue, not a mystery.</p>
<div class="callout">
<strong>Key principle:</strong> Data doesn't magically appear in dashboards. It travels through a pipeline that extracts, transforms, and loads it — and every step is a potential point of failure. When "just pull the data" takes three days, it's because the pipeline is the hard part.
</div>` }
  ],
  scenario: null,
  quiz: {
    questions: [
      {
        q: "What's the primary difference between a data warehouse and a data lake?",
        options: [
          "A warehouse is in the cloud, a lake is on-premise",
          "A warehouse stores structured, cleaned data for analysis; a lake stores raw data in any format",
          "A warehouse is for big companies, a lake is for startups",
          "They're the same thing with different branding"
        ],
        correct: 1,
        explanation: "Warehouses (Snowflake, BigQuery) are optimized for structured queries. Lakes (S3, Azure Data Lake) store everything raw. Most companies use both — the lake for storage, the warehouse for analysis."
      },
      {
        q: "Your marketing team says 10,000 signups this month. Your product team says 8,000. What's the most likely explanation?",
        options: [
          "Someone is lying",
          "The teams are defining \"signup\" differently or pulling from different data sources",
          "The product database lost 2,000 records",
          "Marketing is counting duplicates"
        ],
        correct: 1,
        explanation: `Data discrepancies almost always come from different definitions, different source systems, or different pipeline timing. The first step is always "how are we each defining this metric?"`
      }
    ]
  }
},

// ─── MODULE 5 ───
{
  id: 5, title: "Cloud & Infrastructure", time: "15 min",
  lessons: [
    { id: "5.1", title: "What 'the cloud' actually means", body: `
<p>"The cloud" is not a place. It's someone else's computers. When a company says "we're moving to the cloud," they mean they're moving from running software on physical servers they own to running it on servers owned and managed by Amazon (AWS), Microsoft (Azure), or Google (GCP).</p>
<p>Before the cloud, if you wanted to launch a web application, you had to buy physical servers, put them in a data center, wire up the networking, install the operating system, configure the software, and hire people to maintain everything. If your app got popular and you needed more capacity, you'd order more servers, wait weeks for delivery, set them up, and hope you didn't run out of capacity in the meantime. If your app flopped, you had a closet full of expensive hardware collecting dust.</p>
<p>Cloud computing eliminated this. With AWS, you can spin up a new server in 60 seconds, use it for an hour, and pay a few cents. Need 100 servers for a big product launch? Click a button. Need to scale back down when traffic normalizes? Click another button. This <strong>elasticity</strong> — the ability to scale resources up and down on demand — is the fundamental value proposition of the cloud.</p>
<p>The three major cloud providers — <strong>AWS</strong> (Amazon Web Services), <strong>Azure</strong> (Microsoft), and <strong>GCP</strong> (Google Cloud Platform) — collectively run a huge portion of the internet. They don't just provide servers. They offer hundreds of services: databases, file storage, machine learning tools, email delivery, message queues, DNS management, content delivery networks, and much more. Each service is a building block that developers can use instead of building from scratch.</p>
<div class="callout">
<strong>Key principle:</strong> "The cloud" is rented infrastructure. It replaced the need to own and maintain physical servers with a pay-as-you-go model that scales on demand. When someone mentions AWS, Azure, or GCP, they're talking about where the software runs and the building blocks it's composed of.
</div>` },
    { id: "5.2", title: "Servers, containers, and serverless", body: `
<p>A <strong>server</strong> is just a computer that runs software and responds to requests. When 1,000 people visit your website simultaneously, a server (or group of servers) handles all those requests. But how software runs on those servers has evolved dramatically.</p>
<p><strong>Virtual machines (VMs)</strong> were the first big innovation. Instead of one application per physical server, you could run multiple isolated "virtual" computers on a single physical machine. Each VM has its own operating system and behaves like a separate computer. This was more efficient but still heavy — each VM consumes significant resources just for its operating system.</p>
<p><strong>Containers</strong> (Docker is the dominant tool) are a lighter alternative. A container packages an application with everything it needs to run — code, libraries, settings — without needing its own operating system. Containers share the host machine's operating system, making them much faster to start and more efficient with resources. When a developer says "it's containerized" or "it runs in Docker," they mean the application is packaged in a portable, self-contained unit that runs the same way everywhere.</p>
<p><strong>Serverless</strong> (AWS Lambda, Google Cloud Functions) takes it a step further. You don't manage servers at all. You write a function, upload it, and the cloud provider runs it whenever it's triggered — by an API call, a file upload, a scheduled timer, or an event. You pay only for the exact computation time used. The name "serverless" is misleading — there are absolutely still servers involved. You just don't have to think about them.</p>
<p><strong>Kubernetes</strong> (often abbreviated K8s) is an orchestration system for managing containers at scale. If Docker is a shipping container, Kubernetes is the port authority — it decides which containers run where, scales them up and down based on demand, and restarts them if they crash. It's powerful but complex, and its complexity is a recurring source of engineering jokes and headaches.</p>
<div class="callout">
<strong>Key principle:</strong> The evolution went from physical servers → virtual machines → containers → serverless. Each step traded control for convenience. Understanding where your company's software sits on this spectrum tells you a lot about their infrastructure maturity and operational costs.
</div>` },
    { id: "5.3", title: "Scaling — why 'just add more servers' isn't simple", body: `
<p>When an app gets popular, it needs to handle more users, more data, and more requests. This is called <strong>scaling</strong>, and it's where simple things become hard.</p>
<p><strong>Vertical scaling</strong> means making a single server bigger — more CPU, more memory, more storage. It's simple but has limits. You can't make one machine infinitely powerful, and bigger machines get disproportionately expensive.</p>
<p><strong>Horizontal scaling</strong> means adding more servers and distributing the work across them. This is more powerful but vastly more complex. Now you have to answer questions like: how do you distribute requests across multiple servers (load balancing)? If a user's data is on server A, what happens when their next request goes to server B (session management)? How do you keep the databases in sync across servers (replication)? What happens when one server fails (fault tolerance)?</p>
<p>A <strong>load balancer</strong> sits in front of multiple servers and distributes incoming requests among them. It's like a host at a restaurant directing diners to open tables. If one server goes down, the load balancer routes traffic to the remaining healthy servers. This is the most basic building block of horizontal scaling.</p>
<p><strong>Caching</strong> is the other major scaling tool. Instead of computing the same result over and over, you store it temporarily and serve the stored version. A product page that gets 10,000 views per hour doesn't need to query the database 10,000 times — you query it once, cache the result, and serve the cache. Redis and Memcached are popular caching tools. CDNs (Content Delivery Networks) like Cloudflare are essentially a global cache for static content — they store copies of your images, JavaScript, and CSS at servers around the world so users get content from a nearby server instead of yours.</p>
<div class="callout">
<strong>Key principle:</strong> Scaling is where engineering meets economics. Every scaling decision is a trade-off between performance, complexity, reliability, and cost. When an engineering team says "we need to rethink our architecture to support growth," this is what they mean.
</div>` },
    { id: "5.4", title: "Monitoring, uptime, and why things break", body: `
<p>Production systems fail. The question isn't if but when and how badly. What separates good engineering teams from bad ones isn't preventing all failures — it's detecting them fast, understanding them quickly, and recovering gracefully.</p>
<p><strong>Monitoring</strong> is the practice of collecting data about how your systems are performing in real time. CPU usage, memory consumption, response times, error rates, database query speeds, queue lengths — all of this is continuously measured and displayed in dashboards (tools like Datadog, Grafana, New Relic). When a metric crosses a threshold — say, error rate exceeds 1% — an <strong>alert</strong> fires, paging the on-call engineer.</p>
<p><strong>Uptime</strong> is measured in "nines." 99% uptime sounds great until you do the math: that's 3.65 days of downtime per year. 99.9% (three nines) is 8.7 hours per year. 99.99% (four nines) is 52 minutes per year. 99.999% (five nines) is 5 minutes per year. Each additional nine is exponentially harder and more expensive to achieve.</p>
<p>When things do break, teams conduct <strong>postmortems</strong> (also called incident reviews or retrospectives). The goal isn't blame — it's learning. What failed? What was the root cause? Why didn't our monitoring catch it sooner? What will we change to prevent it from happening again? Good postmortem culture is blameless and focused on systemic improvements rather than individual mistakes.</p>
<div class="callout">
<strong>Key principle:</strong> Reliable systems aren't the ones that never fail. They're the ones that fail gracefully, detect problems quickly, and learn from every incident. If your company doesn't do postmortems, it's repeating the same failures.
</div>` }
  ],
  scenario: null,
  quiz: {
    questions: [
      {
        q: `A developer says "we can deploy that as a Lambda function." What are they suggesting?`,
        options: [
          "Running it on a dedicated server 24/7",
          "Running it as serverless code that only executes when triggered, with no server management",
          "Running it in a Docker container",
          "Running it on the developer's local machine"
        ],
        correct: 1,
        explanation: "AWS Lambda (and similar services) run your code only when needed — triggered by events, API calls, or schedules. You don't manage any servers. You pay only for execution time."
      },
      {
        q: "Your site goes from 1,000 to 100,000 daily users. What's the first thing the engineering team likely needs?",
        options: [
          "A bigger office",
          "Load balancing and caching to distribute traffic across multiple servers",
          "A complete rewrite of the application",
          "A new domain name"
        ],
        correct: 1,
        explanation: "Horizontal scaling (load balancers to distribute traffic, caching to reduce redundant computation) is the standard first response to traffic growth. A complete rewrite is almost never the right first move."
      }
    ]
  }
},

// ─── MODULE 6 ───
{
  id: 6, title: "Security & Privacy", time: "12 min",
  lessons: [
    { id: "6.1", title: "Authentication vs authorization", body: `
<p>These two words sound similar but mean completely different things, and confusing them is one of the most common mistakes in both conversations and code.</p>
<p><strong>Authentication</strong> is proving who you are. When you enter your username and password, you're authenticating — proving to the system that you are who you claim to be. Multi-factor authentication (MFA) adds a second proof: something you know (password) plus something you have (phone) or something you are (fingerprint). OAuth (the "Sign in with Google" button) is an authentication protocol that lets you prove your identity through a trusted third party rather than creating a new password.</p>
<p><strong>Authorization</strong> is determining what you're allowed to do. After the system knows who you are (authentication), it checks what permissions you have (authorization). You might be authenticated as an employee but not authorized to view payroll data. You might be authorized to read a document but not to edit it.</p>
<p>A real-world analogy: authentication is showing your ID at the door. Authorization is the bouncer checking whether your name is on the VIP list. You can prove who you are (authenticated) and still be told "you don't have access to that" (not authorized).</p>
<p>In APIs, this distinction manifests as <strong>API keys</strong> and <strong>tokens</strong>. An API key authenticates your application ("this request is from our app"). A token — often a JWT (JSON Web Token) — authenticates and authorizes a specific user ("this request is from Greg, who has admin access"). When you see "401 Unauthorized" in an error log, it usually means authentication failed. "403 Forbidden" means authentication succeeded but authorization failed.</p>
<div class="callout">
<strong>Key principle:</strong> Authentication = who are you? Authorization = what can you do? They're separate systems and getting either wrong can be catastrophic.
</div>` },
    { id: "6.2", title: "Common vulnerabilities in plain English", body: `
<p>You don't need to be a security expert, but knowing the most common attack types makes you a better decision-maker.</p>
<p><strong>SQL injection</strong> is when an attacker inserts malicious database commands through an input field. If a login form naively puts your username directly into a SQL query, an attacker can type something that changes the query itself — potentially accessing, modifying, or deleting the entire database. This is one of the oldest and most common web attacks, and the fix (parameterized queries) is well-known but still frequently forgotten.</p>
<p><strong>Cross-site scripting (XSS)</strong> is when an attacker injects malicious JavaScript into a web page that other users see. If a comment section doesn't properly sanitize input, an attacker could post a "comment" that's actually a script that steals other users' session cookies when they view the page. The fix is sanitizing all user input — treating everything a user types as potentially dangerous.</p>
<p><strong>Phishing</strong> isn't a software vulnerability — it's a human one. Trick someone into entering credentials on a fake login page and you have their password. No amount of code security prevents a user from willingly giving away their password to a convincing fake. This is why multi-factor authentication matters — even if the password is compromised, the attacker still needs the second factor.</p>
<p><strong>Data breaches</strong> happen when an attacker gains access to a database containing sensitive information. The impact depends entirely on how the data was stored. Passwords should be <strong>hashed</strong> (irreversibly transformed into a random-looking string) so that even if the database is stolen, the actual passwords are unrecoverable. If passwords are stored in plain text — which still happens more than you'd think — a breach exposes every user's actual password.</p>
<div class="callout">
<strong>Key principle:</strong> Security is not a feature you add at the end. It's a practice embedded in every line of code, every architectural decision, and every user interaction. The most common attacks exploit predictable, well-known vulnerabilities that simply weren't addressed.
</div>` },
    { id: "6.3", title: "Privacy, compliance, and why engineers care", body: `
<p>Privacy regulations like <strong>GDPR</strong> (Europe), <strong>CCPA</strong> (California), and others aren't just legal requirements — they directly shape how software is built.</p>
<p>GDPR, for example, gives users the "right to be forgotten" — they can demand that a company delete all their personal data. This sounds simple until you realize that user data might be scattered across 15 different databases, cached in multiple systems, embedded in log files, replicated across backup systems, and referenced in analytics pipelines. Building a "delete my data" feature that actually deletes data everywhere is a significant engineering challenge.</p>
<p><strong>Data minimization</strong> — collecting only the data you actually need — is both a legal principle and a technical one. Every piece of data you store is a piece of data you have to secure, maintain, and potentially delete. The safest data is data you never collected in the first place.</p>
<p><strong>Encryption</strong> protects data in two states: <strong>at rest</strong> (stored on disk) and <strong>in transit</strong> (moving across a network). HTTPS — the padlock in your browser — encrypts data in transit so that someone intercepting your network traffic can't read it. Encryption at rest means that even if someone physically steals a hard drive, they can't read the data without the encryption key.</p>
<div class="callout">
<strong>Key principle:</strong> Privacy and security aren't obstacles to building software — they're requirements. They affect database design, API design, data retention policies, and feature architecture. The best time to think about them is at the beginning of a project, not after a breach.
</div>` }
  ],
  scenario: null,
  quiz: {
    questions: [
      {
        q: `Your app returns a "403 Forbidden" error when a logged-in user tries to access a page. What's happening?`,
        options: [
          "The user's password is wrong",
          "The server is down",
          "The user is authenticated but not authorized to access that resource",
          "The page doesn't exist"
        ],
        correct: 2,
        explanation: "403 means the server knows who you are (authentication succeeded) but you don't have permission (authorization denied). 401 would mean authentication failed. 404 would mean the page doesn't exist."
      }
    ]
  }
},

// ─── MODULE 7 ───
{
  id: 7, title: "Product Management & Agile", time: "15 min",
  lessons: [
    { id: "7.1", title: "Agile, sprints, and how teams actually work", body: `
<p><strong>Agile</strong> is a philosophy for building software: instead of planning everything upfront and delivering one big release, build in small increments, get feedback, and adjust. The most popular implementation is <strong>Scrum</strong>, which structures work into <strong>sprints</strong> — usually two-week cycles.</p>
<p>Each sprint follows a rhythm. It starts with <strong>sprint planning</strong>, where the team selects items from the <strong>backlog</strong> (a prioritized list of all work to be done) and commits to completing them. During the sprint, the team works on those items. Each day starts with a <strong>standup</strong> — a brief meeting (ideally 15 minutes) where everyone shares what they did yesterday, what they're doing today, and if anything is blocking them. At the end, there's a <strong>sprint review</strong> (demo what was built) and a <strong>retrospective</strong> (discuss what went well and what to improve).</p>
<p><strong>Story points</strong> are how teams estimate work. Instead of hours or days, they use abstract units that represent complexity and effort. A simple bug fix might be 1 point. A new feature with database changes, API updates, and frontend work might be 8 points. The abstraction sounds weird but it works — it separates "how long will this take" from "how hard is this," which are different questions. Over time, teams develop a <strong>velocity</strong> — the average number of points they complete per sprint — which becomes a reliable planning tool.</p>
<p><strong>Kanban</strong> is an alternative to Scrum. Instead of fixed sprints, work flows continuously through stages: To Do → In Progress → In Review → Done. There are limits on how many items can be in each stage at once (called <strong>WIP limits</strong> — work in progress limits). If the "In Review" column is full, the team stops starting new work and focuses on reviewing. This prevents bottlenecks and keeps work flowing smoothly.</p>
<div class="callout">
<strong>Key principle:</strong> Agile isn't a rigid process — it's a set of principles about iteration, feedback, and adaptation. The specific implementation (Scrum, Kanban, or a hybrid) matters less than the underlying discipline of shipping small increments and learning from them.
</div>` },
    { id: "7.2", title: "Roadmaps, backlogs, and prioritization", body: `
<p>A <strong>roadmap</strong> is a strategic plan for where a product is going. It's not a promise — it's a direction. Good roadmaps communicate themes and priorities ("Q2 is about improving onboarding, Q3 is about enterprise features") rather than specific feature commitments with hard dates. The moment a roadmap becomes a list of features with deadlines, it becomes a fiction that everyone pretends to believe.</p>
<p>The <strong>backlog</strong> is where all the work lives — feature ideas, bug reports, technical debt items, research spikes. A healthy backlog is prioritized ruthlessly. The top items are well-defined and ready to work on. The bottom items might never get done, and that's fine. An overstuffed backlog where everything is "high priority" is the same as nothing being prioritized.</p>
<p>Prioritization frameworks help teams make decisions systematically. <strong>RICE</strong> (Reach × Impact × Confidence / Effort) scores each item by how many users it affects, how much it matters, how confident you are in those estimates, and how much effort it requires. <strong>MoSCoW</strong> (Must have, Should have, Could have, Won't have) is simpler — it forces you to put items into buckets. The specific framework matters less than having a disciplined process that prevents the loudest stakeholder from always winning.</p>
<div class="callout">
<strong>Key principle:</strong> The most important product skill isn't adding things to the roadmap — it's removing them. Every feature you say yes to is a feature that takes time away from something else. The best PMs are the ones who can say "not now" and explain why convincingly.
</div>` },
    { id: "7.3", title: "User stories, acceptance criteria, and 'definition of done'", body: `
<p>A <strong>user story</strong> is a description of a feature from the user's perspective: "As a [type of user], I want [something] so that [reason]." For example: "As a team manager, I want to export my team's timesheet data as a CSV so that I can submit it to payroll." The format forces you to think about who needs it, what they need, and why.</p>
<p><strong>Acceptance criteria</strong> define what "done" means for a user story. They're the checklist that determines whether the implementation actually satisfies the requirement. For the timesheet export: "The export includes all team members. Dates default to the current pay period. The CSV opens correctly in Excel. If there are no entries, the export shows headers with no data rows rather than failing."</p>
<p>Without clear acceptance criteria, "done" is subjective. The developer thinks it's done when the export button works. The PM thinks it's done when it handles all edge cases. The designer thinks it's done when it matches the mockups. This misalignment causes rework, frustration, and shipped features that technically work but don't actually solve the user's problem.</p>
<p>The <strong>definition of done</strong> (DoD) is the team's universal standard for when any work item is truly complete. It typically includes: code is written and tested, pull request is reviewed and approved, documentation is updated, the feature works in staging, and the PM has signed off. Without a DoD, "done" means different things to different people, and partially-finished work accumulates.</p>
<div class="callout">
<strong>Key principle:</strong> Vague requirements produce vague results. The time spent writing clear user stories and acceptance criteria before development starts pays for itself many times over in reduced rework and miscommunication.
</div>` },
    { id: "7.4", title: "The PM-engineering relationship", body: `
<p>The relationship between product managers and engineers is one of the most important dynamics in any software organization, and also one of the most fraught.</p>
<p>The PM's job is to decide <strong>what</strong> to build and <strong>why</strong>. The engineer's job is to decide <strong>how</strong> to build it and to flag when the "what" is infeasible, dangerous, or more complex than it appears. When this boundary is respected, the relationship is productive. When it's violated — PMs dictating technical implementation, engineers ignoring business requirements — everything breaks down.</p>
<p>The best PMs bring engineers into the "why" early. Instead of handing over a fully-specified feature requirement, they share the problem they're trying to solve and ask for input on possible solutions. Engineers often see options that PMs don't, and they can flag technical constraints that fundamentally reshape the approach. The worst PMs treat engineers as order-takers — "build exactly this" — and then are surprised when the result doesn't solve the actual problem.</p>
<p>Engineers earn trust by communicating proactively — flagging risks early, explaining trade-offs in business terms (not technical jargon), and being honest about uncertainty rather than giving optimistic estimates. The worst engineers say "that's technically impossible" when they mean "that's hard," or go silent for two weeks and then reveal a problem that could have been caught on day one.</p>
<div class="callout">
<strong>Key principle:</strong> The PM-engineering relationship works best when both sides understand and respect the boundary between "what/why" (PM's domain) and "how" (engineering's domain), while collaborating actively in the overlap.
</div>` }
  ],
  scenario: {
    situation: `You're reviewing the sprint backlog. There are 12 items, and the team's velocity suggests they can complete about 8 points this sprint. Three stakeholders each insist their item is the highest priority. One is a revenue-impacting bug, one is a feature requested by the biggest client, and one is a security vulnerability flagged by the engineering team.`,
    prompt: "How do you prioritize?",
    options: [
      { text: "The revenue bug — money comes first", id: "a" },
      { text: "The client feature — losing the biggest client would be worse", id: "b" },
      { text: "The security vulnerability — risk of breach outweighs both", id: "c", correct: true },
      { text: "Split the sprint evenly across all three", id: "d" }
    ],

// ─── MODULE 8 ───
{
  id: 8, title: "AI Products Are Still Software", time: "20 min",
  lessons: [
    { id: "8.1", title: "AI is workflows around probabilistic models", body: `
<p>Here's the single most important mental model for understanding AI products: <strong>AI is not magic — it's software with a probabilistic component.</strong> A traditional app has deterministic logic: the same input always produces the same output. An AI app has a model at its core that produces <em>probable</em> outputs — the same input might produce slightly different results each time, and some of those results might be wrong.</p>
<p>This is a fundamental shift. In traditional software, a bug means the code is doing something wrong. In AI software, the model might be doing exactly what it's designed to do and still produce an incorrect result. A language model generates the most statistically likely next token — that's its job. If the statistically likely response happens to be factually wrong (a "hallucination"), the model isn't broken. It's working as intended in a way that produces an undesirable outcome.</p>
<p>Every AI product you've used is mostly <em>non-AI software</em> surrounding a model. ChatGPT is a web application (frontend, backend, databases, authentication, billing) with a language model in the middle. The model generates text. Everything else — the chat interface, conversation history, file uploads, tool usage, safety filters, rate limiting — is traditional software engineering.</p>
<p>This is why "demos lie and products are hard." A demo shows the model working under ideal conditions with a curated prompt. A product has to handle every possible input, fail gracefully, manage costs, enforce safety, handle scale, and meet user expectations — all of which are engineering problems, not model problems.</p>
<div class="callout">
<strong>Key principle:</strong> AI products = traditional software engineering + a probabilistic model + the workflows needed to make that model useful and reliable. The AI part is often less than 20% of the total work. The other 80% is everything we've covered in this course.
</div>` },
    { id: "8.2", title: "Prompting vs workflows vs agents", body: `
<p>These three concepts represent increasing levels of sophistication in how AI is used, and understanding the spectrum helps you evaluate AI product claims.</p>
<p><strong>Prompting</strong> is the simplest: you write a text instruction and send it to a model. "Summarize this document." "Translate this to Spanish." "Write a marketing email for our new product." One input, one output. This is how most people interact with AI today.</p>
<p><strong>Workflows</strong> are multi-step processes where the output of one AI call feeds into the next, often with traditional code in between. Example: extract key facts from a document (AI call #1) → look up those facts in a database (code) → generate a report comparing the facts to historical data (AI call #2) → format the report as a PDF (code). Workflows are where AI gets genuinely powerful because you're combining the model's capabilities with structured data and logic.</p>
<p><strong>Agents</strong> are the frontier. An agent is an AI system that can decide what to do next, use tools, and iterate. Instead of following a fixed workflow, an agent assesses the situation, picks the appropriate tool (search the web, query a database, call an API, write code), observes the result, and decides its next action. In theory, agents can handle complex, open-ended tasks autonomously. In practice, they're still unreliable for anything mission-critical because each decision point is a place where the probabilistic model might go wrong.</p>
<p>The hype cycle is currently at "agents will replace workers." The reality is closer to "agents will automate specific, bounded tasks with human oversight for anything important." The gap between a demo of an agent booking a flight and a production system that reliably books the right flight, handles errors, manages cancellations, and doesn't accidentally spend $10,000 is enormous.</p>
<div class="callout">
<strong>Key principle:</strong> Prompting is a single turn. Workflows are multi-step with logic in between. Agents make their own decisions. Each level is more powerful and more fragile. Most real production AI is workflows, not agents.
</div>` },
    { id: "8.3", title: "MCPs — the Model Context Protocol", body: `
<p><strong>MCP</strong> (Model Context Protocol) is an open standard that solves a specific problem: how do AI models connect to external tools and data sources in a consistent, reusable way?</p>
<p>Before MCP, if you wanted Claude to access your company's Salesforce data, someone had to build a custom integration. If you also wanted it to access Google Drive, someone had to build another custom integration. And if you switched from Claude to GPT, every integration had to be rebuilt from scratch. This is called the <strong>N×M problem</strong> — N AI models times M tools equals a lot of custom connectors.</p>
<p>MCP standardizes this. An MCP <strong>server</strong> is a small program that exposes a tool or data source in a standardized format. An MCP <strong>client</strong> (built into the AI application) can connect to any MCP server. So a Salesforce MCP server works with Claude, GPT, Gemini, or any other AI that supports the protocol — just like a USB cable works with any USB device.</p>
<p>The architecture has three layers. The <strong>host</strong> is the AI application (like Claude Desktop or an IDE). The <strong>client</strong> lives inside the host and manages connections to servers. The <strong>servers</strong> are the tools — a Slack server that can search messages, a GitHub server that can create pull requests, a database server that can run queries. When you ask Claude "find the latest sales report in our database and email it to my manager," MCP is what lets Claude actually do both of those things by calling the appropriate servers.</p>
<p>MCP matters because it's becoming the standard. Anthropic created it, but OpenAI, Google, and the broader ecosystem have adopted it. There are already tens of thousands of MCP servers for different tools and services. It's the protocol that makes AI agents practical — without a standard way to connect to tools, agents are limited to whatever was hardcoded into them.</p>
<div class="callout">
<strong>Key principle:</strong> MCP is USB for AI — a universal standard for connecting AI models to external tools and data. It solves the integration problem that previously required custom code for every model-tool combination. If someone says "we have an MCP server for that," they mean the tool is ready for any MCP-compatible AI to use.
</div>` },
    { id: "8.4", title: "RAG, structured output, and grounding", body: `
<p>Three concepts that come up constantly in AI product discussions:</p>
<p><strong>RAG</strong> (Retrieval-Augmented Generation) is a technique where the AI searches for relevant information before generating a response. Instead of relying solely on what the model "knows" from training, RAG retrieves specific documents, database entries, or web pages and feeds them to the model as context. "Answer this question using the information in these three documents" is fundamentally more reliable than "answer this question from memory." RAG is how most enterprise AI products work — they search your company's knowledge base first, then generate a response grounded in your actual data.</p>
<p><strong>Structured output</strong> means getting the AI to produce data in a specific, predictable format (usually JSON) rather than free-form text. If you're building a workflow where the AI extracts invoice data, you need it to return <code>{"vendor": "Acme", "amount": 1500, "date": "2025-03-15"}</code> — not a paragraph describing the invoice. Structured output turns AI from a conversational tool into a component you can plug into automated systems.</p>
<p><strong>Grounding</strong> is the broader concept of connecting AI outputs to verifiable reality. Citations (linking to sources), tool use (checking facts against databases), and human review are all forms of grounding. The fundamental challenge with AI is that it generates plausible-sounding text that may or may not be true. Every technique for making AI more reliable is ultimately a form of grounding — anchoring its outputs to something real.</p>
<div class="callout">
<strong>Key principle:</strong> RAG is "look it up before answering." Structured output is "give me data, not prose." Grounding is "prove it." These three patterns are the building blocks of AI products that are actually reliable enough to trust.
</div>` },
    { id: "8.5", title: "Why demos lie and products are hard", body: `
<p>A demo is a controlled performance. A product is reality.</p>
<p>In a demo, the prompt is carefully crafted. The data is clean. The edge cases are avoided. The model gets one chance to impress, and if it fails, the presenter runs it again. You see the best 5% of outputs. In a product, every user brings their own messy, ambiguous, unexpected input. The data is incomplete. The edge cases are the majority of real usage. The model has to work every time, and when it fails, there's no presenter to intervene — there's a frustrated user.</p>
<p>The gap between demo and product includes: <strong>prompt engineering at scale</strong> (writing prompts that work for 1,000 different inputs, not just the one in the demo), <strong>error handling</strong> (what happens when the model generates garbage), <strong>cost management</strong> (each API call costs money, and costs add up fast at scale), <strong>latency</strong> (users expect responses in seconds, not minutes), <strong>safety</strong> (preventing the model from saying harmful things), <strong>evaluation</strong> (how do you even measure if the AI is doing a good job?), and <strong>edge cases</strong> (the weird inputs that break everything).</p>
<p>This is why so many AI startups have impressive demos and struggling products. The demo is the easy part. The product is where all the engineering lessons from the rest of this course — state management, API design, error handling, scaling, monitoring, security — come back as requirements. AI doesn't exempt you from software engineering. It adds a new, uniquely unpredictable component on top of all the existing challenges.</p>
<div class="callout">
<strong>Key principle:</strong> The hardest part of building AI products isn't the AI. It's everything around it. Be skeptical of any demo that doesn't address error handling, edge cases, cost, and scale. Those are the problems that determine whether a demo becomes a product.
</div>` }
  ],
  scenario: null,
  quiz: {
    questions: [
      {
        q: "What is MCP (Model Context Protocol)?",
        options: [
          "A way to encrypt AI model weights",
          "A standardized protocol for connecting AI models to external tools and data sources",

// ─── MODULE 9 ───
{
  id: 9, title: "How to Talk to Technical People", time: "15 min",
  lessons: [
    { id: "9.1", title: "Good questions vs bad questions", body: `
<p>The fastest way to earn credibility in a technical conversation is asking good questions. The fastest way to lose it is asking bad ones. The difference isn't about knowledge — it's about precision.</p>
<p><strong>Bad question:</strong> "Why is the app slow?" This is vague enough to be unanswerable. Slow for whom? On what device? Which part of the app? Slow compared to what? The engineer now has to ask five clarifying questions before they can even begin to think about the answer.</p>
<p><strong>Good question:</strong> "The dashboard takes about 8 seconds to load for users with more than 1,000 records. Is that a query issue or a rendering issue?" This is specific, measurable, and shows you've already done some thinking. It gives the engineer a starting point and demonstrates that you understand the frontend/backend distinction.</p>
<p>The formula is: <strong>observation + specificity + a hypothesis (even if wrong)</strong>. "I noticed X. It seems to happen when Y. Could it be related to Z?" This gives the engineer something to work with. Even if your hypothesis is wrong, the fact that you offered one shows you're engaged and thinking, not just lobbing complaints over the wall.</p>
<p>Questions that build credibility: "What are the trade-offs between those two approaches?" "What breaks if we do it that way?" "Is this the kind of thing that gets harder to change later?" "What would you need to be confident in that estimate?"</p>
<p>Questions that destroy credibility: "Can you just...?" "Why can't you just...?" "How hard can it be?" "Shouldn't this be easy?" Each of these implies the work is trivial and the engineer is either lazy or incompetent.</p>
<div class="callout">
<strong>Key principle:</strong> Good questions demonstrate that you respect the complexity of the work. They're specific, they show your own thinking, and they invite collaboration rather than demanding answers.
</div>` },
    { id: "9.2", title: "Signals that build credibility", body: `
<p>Technical credibility for nontechnical people isn't about knowing how to code. It's about demonstrating that you understand how software works well enough to make good decisions and communicate effectively.</p>
<p><strong>Acknowledge uncertainty honestly.</strong> "I don't fully understand the implications of that — can you walk me through the trade-offs?" is far more credible than pretending to understand and making a bad decision. Engineers will forgive not knowing something. They will not forgive faking it and then blaming them when the decision goes wrong.</p>
<p><strong>Use the right vocabulary at the right level.</strong> You don't need to say "let's refactor the GraphQL resolver to reduce N+1 queries." But saying "the dashboard seems to make too many database calls — is there a way to batch them?" shows you understand the concept without pretending to know the implementation.</p>
<p><strong>Reference data and specifics.</strong> "Users are complaining about speed" is weak. "Our P95 response time went from 200ms to 1.2 seconds after last week's deploy" is strong. Even if you got that number from a dashboard someone else built, citing it shows you're grounded in reality.</p>
<p><strong>Follow up on technical discussions.</strong> If the team discussed a trade-off in last week's meeting, reference it: "We decided to go with the simpler approach last week — how's that working out?" This shows you're paying attention and care about the outcomes, not just the decisions.</p>
<div class="callout">
<strong>Key principle:</strong> Credibility comes from honesty, specificity, and follow-through — not from technical knowledge. The nontechnical people that engineers respect most are the ones who ask sharp questions, acknowledge what they don't know, and hold everyone (including themselves) accountable for outcomes.
</div>` },
    { id: "9.3", title: "Signals that destroy credibility", body: `
<p>Some behaviors reliably destroy your credibility with technical teams. They're worth knowing so you can avoid them.</p>
<p><strong>"That should be easy."</strong> Unless you've built it before, you don't know that. And even if it seems simple, the edge cases, testing, security implications, and integration work might make it much harder than it appears. This phrase signals that you don't respect the complexity of the work.</p>
<p><strong>Comparing to other products.</strong> "Twitter has this feature, so it can't be that hard." Twitter also has 1,000+ engineers and a decade of infrastructure. Your comparison dismisses the fundamental difference in resources, codebase, and context.</p>
<p><strong>Scope creep disguised as clarity.</strong> "Oh, and it should also..." after the work is already estimated and planned. Each addition resets the scope and invalidates previous estimates. If you have new requirements, own them as new requirements — don't sneak them in as "obvious" additions.</p>
<p><strong>Treating estimates as promises.</strong> An estimate is a prediction under uncertainty. Treating it as a contractual commitment creates a culture where engineers pad estimates defensively, which is worse for everyone.</p>
<p><strong>Going around the team.</strong> Making technical decisions without consulting engineers, then informing them. "I told the client we'd have it by Friday" when you haven't checked with the team is a credibility-destroying move that also happens to be terrible management.</p>
<div class="callout">
<strong>Key principle:</strong> Credibility with technical teams is hard to build and easy to destroy. The common thread in all credibility-destroying behaviors is disrespecting the complexity, autonomy, or expertise of the people doing the work.
</div>` },
    { id: "9.4", title: "Knowing when you're out of your depth", body: `
<p>There will be moments in technical conversations where you have no idea what's being discussed. Database indexing strategies, caching invalidation, distributed consensus algorithms, container orchestration — these are deep technical domains where a nontechnical person genuinely can't contribute to the "how."</p>
<p>The skill isn't avoiding these moments. It's <strong>recognizing them accurately and responding productively.</strong></p>
<p>First, distinguish between "I don't understand this yet" and "this isn't my domain." If a concept keeps coming up in your work, invest time in learning the basics. If it's a one-time deep technical discussion, it's fine to listen and focus on the parts that affect your decisions.</p>
<p>Second, <strong>know your entry points.</strong> Even in deeply technical discussions, there are always questions you can and should ask: "What's the risk if this goes wrong?" "How does this affect the timeline?" "What are we trading off?" "Do we need to make this decision now or can we revisit it?" These questions are always relevant and always within your domain.</p>
<p>Third, <strong>invest in learning the areas where you're consistently out of your depth.</strong> If every conversation about infrastructure makes you uncomfortable, spend two hours learning the basics. You don't need expertise — you need enough literacy to follow the conversation and ask good questions. That's what this course is about.</p>
<div class="callout">
<strong>Key principle:</strong> The most dangerous person in a technical room is the one who doesn't know what they don't know. The most valuable nontechnical person is the one who can accurately sense their knowledge boundary and navigate it with honesty, curiosity, and clear goal-setting.
</div>` }
  ],
  scenario: null,
  quiz: {
    questions: [
      {
        q: "An engineer gives a 3-week estimate. Your manager wants it in 1 week. The best response is:",
        options: [
          "Tell the engineer to work faster",

  id: 10, title: "Putting It All Together", time: "10 min",
  lessons: [
    { id: "10.1", title: "How everything connects", body: `
<p>You now understand the full stack — not as a developer, but as someone who can see how the pieces fit together.</p>
<p>A user opens their browser (<strong>frontend</strong>). The page loads HTML, CSS, and JavaScript. They click a button, which sends a request through an <strong>API</strong> to the <strong>backend</strong>. The backend checks their <strong>authentication</strong>, verifies their <strong>authorization</strong>, queries the <strong>database</strong>, and returns data. The frontend renders that data in the <strong>interface</strong>. The whole thing runs on <strong>cloud infrastructure</strong> — servers, load balancers, containers — monitored by dashboards that track <strong>uptime</strong> and <strong>performance</strong>. The code was built by a team using <strong>Git</strong>, organized in <strong>sprints</strong>, and deployed through an automated <strong>pipeline</strong>. Some features use <strong>AI models</strong> connected via <strong>MCP</strong> to external tools, with <strong>RAG</strong> for accuracy and <strong>structured output</strong> for reliability. The data flows through <strong>ETL pipelines</strong> into a <strong>warehouse</strong> where analysts build dashboards. <strong>Security</strong> is embedded throughout — encryption, authentication, input validation, access controls. <strong>Privacy</strong> regulations govern what data is collected and how it's stored.</p>
<p>That paragraph describes almost every modern software product. And you now understand every word of it.</p>
<div class="callout tip">
<strong>You did it.</strong> You've built a mental model that covers the entire landscape of modern software. Not as an engineer — as someone who can collaborate with engineers, make informed decisions, and lead with confidence.
</div>` },
    { id: "10.2", title: "Where to go from here", body: `
<p>This course gave you conceptual fluency — the ability to understand, discuss, and make decisions about technology. The next step is <strong>applied fluency</strong> — using what you know in real situations.</p>
<p>Some concrete next steps: Learn basic SQL. Even a few hours of practice with SELECT, WHERE, JOIN, and GROUP BY will let you query data yourself instead of waiting for reports. Set up a GitHub account and push a project — even a simple HTML file. The act of committing, pushing, and deploying will cement concepts that are currently theoretical. Read your company's postmortem reports if they're available — they're the best education in how systems actually fail. Sit in on a sprint planning session and follow the discussion with your new vocabulary. Ask an engineer to walk you through one pull request — not to review the code, but to understand the process.</p>
<p>The people who grow the fastest are the ones who can accurately map their own knowledge boundaries and systematically expand them where it matters most. You now have the map. Go explore the territory.</p>
<div class="callout">
<strong>One person can carry an idea all the way to reality. Now you know enough about the machinery to do it.</strong>
</div>` }
  ],
  scenario: null,
  quiz: null
}
];

// ═══════════════════════════════════════════════════════
// APP STATE & PROGRESS
// ═══════════════════════════════════════════════════════

const STORAGE_KEY = 'techFluencyV2Progress';

function loadProgress() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return d && typeof d === 'object' ? d : { lessons: {}, quizzes: {}, scenarios: {} };
  } catch { return { lessons: {}, quizzes: {}, scenarios: {} }; }
}

function saveProgress(p) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

let progress = loadProgress();
let currentView = null; // { type: 'landing' | 'lesson' | 'quiz' | 'scenario' | 'completion', moduleId, lessonId }

// Build flat lesson list for navigation
const flatItems = [];
MODULES.forEach(m => {
  m.lessons.forEach(l => flatItems.push({ type: 'lesson', moduleId: m.id, lessonId: l.id }));
  if (m.scenario) flatItems.push({ type: 'scenario', moduleId: m.id });
  if (m.quiz) flatItems.push({ type: 'quiz', moduleId: m.id });
});

function getItemKey(item) {
  if (item.type === 'lesson') return `lesson-${item.lessonId}`;
  if (item.type === 'quiz') return `quiz-${item.moduleId}`;
  if (item.type === 'scenario') return `scenario-${item.moduleId}`;
  return '';
}

function isItemComplete(item) {
  const key = getItemKey(item);
  if (item.type === 'lesson') return !!progress.lessons[item.lessonId];
  if (item.type === 'quiz') return !!progress.quizzes[item.moduleId];
  if (item.type === 'scenario') return !!progress.scenarios[item.moduleId];
  return false;
}

function getModuleItems(m) {
  const items = m.lessons.map(l => ({ type: 'lesson', moduleId: m.id, lessonId: l.id }));
  if (m.scenario) items.push({ type: 'scenario', moduleId: m.id });
  if (m.quiz) items.push({ type: 'quiz', moduleId: m.id });
  return items;
}

function getModuleProgress(m) {
  const items = getModuleItems(m);
  const done = items.filter(i => isItemComplete(i)).length;
  return { done, total: items.length };
}

function getTotalProgress() {
  let done = 0, total = 0;
  MODULES.forEach(m => {
    const p = getModuleProgress(m);
    done += p.done;
    total += p.total;
  });
  return { done, total };
}

// ═══════════════════════════════════════════════════════
// SIDEBAR RENDERING
// ═══════════════════════════════════════════════════════

function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';

  MODULES.forEach(m => {
    const mp = getModuleProgress(m);
    const pct = mp.total > 0 ? mp.done / mp.total : 0;
    const isDone = mp.done === mp.total;
    const circumference = 2 * Math.PI * 7;
    const offset = circumference * (1 - pct);

    const group = document.createElement('div');
    group.className = 'module-group';

    group.innerHTML = `
      <div class="module-header" data-module="${m.id}">
        <svg class="module-progress-ring ${isDone ? 'done' : ''}" width="20" height="20" viewBox="0 0 20 20">
          <circle class="track" cx="10" cy="10" r="7"/>
          <circle class="fill" cx="10" cy="10" r="7"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <span class="module-title-text">${m.id}. ${m.title}</span>
        <span class="module-badge ${isDone ? 'show' : ''}">&#9733;</span>
        <span class="module-time">~${m.time}</span>
      </div>
      <div class="module-lessons" data-module-lessons="${m.id}"></div>
    `;

    const lessonsContainer = group.querySelector('.module-lessons');

    // Lesson buttons
    m.lessons.forEach(l => {
      const done = !!progress.lessons[l.id];
      const isActive = currentView && currentView.type === 'lesson' && currentView.lessonId === l.id;
      const btn = document.createElement('button');
      btn.className = `lesson-btn${isActive ? ' active' : ''}`;
      btn.innerHTML = `
        <span class="lesson-check ${done ? 'done' : ''}"></span>
        <span class="lesson-label">${l.id} ${l.title}</span>
      `;
      btn.onclick = () => navigateTo({ type: 'lesson', moduleId: m.id, lessonId: l.id });
      lessonsContainer.appendChild(btn);
    });

    // Scenario button
    if (m.scenario) {
      const done = !!progress.scenarios[m.id];
      const isActive = currentView && currentView.type === 'scenario' && currentView.moduleId === m.id;
      const btn = document.createElement('button');
      btn.className = `lesson-btn${isActive ? ' active' : ''}`;
      btn.innerHTML = `
        <span class="lesson-check ${done ? 'done' : ''}"></span>
        <span class="lesson-label"><span class="scenario-icon">&#9670;</span> Scenario</span>
      `;
      btn.onclick = () => navigateTo({ type: 'scenario', moduleId: m.id });
      lessonsContainer.appendChild(btn);
    }

    // Quiz button
    if (m.quiz) {
      const done = !!progress.quizzes[m.id];
      const isActive = currentView && currentView.type === 'quiz' && currentView.moduleId === m.id;
      const btn = document.createElement('button');
      btn.className = `lesson-btn${isActive ? ' active' : ''}`;
      btn.innerHTML = `
        <span class="lesson-check ${done ? 'done' : ''}"></span>
        <span class="lesson-label"><span class="quiz-icon">&#9679;</span> Quiz</span>
      `;
      btn.onclick = () => navigateTo({ type: 'quiz', moduleId: m.id });
      lessonsContainer.appendChild(btn);
    }

    // Collapse/expand toggle
    const header = group.querySelector('.module-header');
    header.addEventListener('click', () => {
      lessonsContainer.classList.toggle('collapsed');
    });

    nav.appendChild(group);
  });

  updateProgressBar();
}

function updateProgressBar() {
  const { done, total } = getTotalProgress();
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const fill = document.getElementById('progress-fill');
  const label = document.getElementById('progress-pct');
  const topProg = document.getElementById('topbar-progress');

  fill.style.width = pct + '%';
  fill.className = 'progress-fill' + (pct === 100 ? ' complete' : '');
  label.textContent = pct + '%';
  topProg.textContent = pct + '%';
}

// ═══════════════════════════════════════════════════════
// CONTENT RENDERING
// ═══════════════════════════════════════════════════════

function navigateTo(view) {
  currentView = view;
  renderContent();
  renderSidebar();

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');

  // Scroll to top
  document.getElementById('content-scroll').scrollTop = 0;
}

function renderContent() {
  const el = document.getElementById('content');

  if (!currentView || currentView.type === 'landing') {
    renderLanding(el);
  } else if (currentView.type === 'lesson') {
    renderLesson(el);
  } else if (currentView.type === 'quiz') {
    renderQuiz(el);
  } else if (currentView.type === 'scenario') {
    renderScenario(el);
  } else if (currentView.type === 'completion') {
    renderCompletion(el);
  }

  // Animate in
  requestAnimationFrame(() => {
    const lc = el.querySelector('.lesson-content, .landing, .completion');
    if (lc) requestAnimationFrame(() => lc.classList.add('visible'));
  });
}

function renderLanding(el) {
  const { done, total } = getTotalProgress();
  const resumeItem = findFirstIncomplete();

  el.innerHTML = `
    <div class="lesson-content landing">
      <div class="landing-icon">&#128218;</div>
      <h1>Tech Fluency</h1>
      <p>The complete guide to understanding software, infrastructure, data, AI, and how to work effectively with technical teams. No coding required.</p>
      <button class="btn-nav primary" onclick="startOrResume()">
        ${done > 0 ? 'Resume where you left off' : 'Start learning'} →
      </button>
      <div class="landing-stats">
        <span><strong>10</strong> Modules</span>
        <span><strong>42</strong> Lessons</span>
        <span><strong>~2.5h</strong> Total</span>
      </div>
    </div>
  `;
}

function renderLesson(el) {
  const mod = MODULES.find(m => m.id === currentView.moduleId);
  const lesson = mod.lessons.find(l => l.id === currentView.lessonId);
  const isDone = !!progress.lessons[lesson.id];
  const idx = flatItems.findIndex(i => i.type === 'lesson' && i.lessonId === lesson.id);
  const prev = idx > 0 ? flatItems[idx - 1] : null;
  const next = idx < flatItems.length - 1 ? flatItems[idx + 1] : null;

  el.innerHTML = `
    <div class="lesson-content">
      <div class="lesson-module-label">Module ${mod.id}: ${mod.title}</div>
      <h1 class="lesson-title">${lesson.title}</h1>
      <div class="lesson-body">${lesson.body}</div>
      <div class="lesson-actions">
        <button class="btn-complete ${isDone ? 'done' : ''}" onclick="toggleComplete('${lesson.id}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            ${isDone ? '<path d="M20 6L9 17l-5-5"/>' : '<circle cx="12" cy="12" r="10"/>'}
          </svg>
          ${isDone ? 'Completed' : 'Mark complete'}
        </button>
        <div class="nav-group">
          ${prev ? `<button class="btn-nav" onclick='navigateTo(${JSON.stringify(prev)})'>← Prev</button>` : ''}
          ${next ? `<button class="btn-nav primary" onclick='navigateTo(${JSON.stringify(next)})'>Next →</button>` : `<button class="btn-nav primary" onclick='checkCompletion()'>Finish →</button>`}
        </div>
      </div>
    </div>
  `;
}

function renderQuiz(el) {
  const mod = MODULES.find(m => m.id === currentView.moduleId);
  const quiz = mod.quiz;
  const isDone = !!progress.quizzes[mod.id];
  const idx = flatItems.findIndex(i => i.type === 'quiz' && i.moduleId === mod.id);
  const prev = idx > 0 ? flatItems[idx - 1] : null;
  const next = idx < flatItems.length - 1 ? flatItems[idx + 1] : null;

  let questionsHtml = quiz.questions.map((q, qi) => {
    const optHtml = q.options.map((opt, oi) => `
      <button class="quiz-option" data-q="${qi}" data-o="${oi}">${opt}</button>
    `).join('');
    return `
      <div class="quiz-question" data-qi="${qi}">
        <p><strong>Q${qi + 1}:</strong> ${q.q}</p>
        <div class="quiz-options">${optHtml}</div>
        <div class="quiz-explanation" data-qe="${qi}">${q.explanation}</div>
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <div class="lesson-content">
      <div class="lesson-module-label">Module ${mod.id}: ${mod.title}</div>
      <h1 class="lesson-title">Quiz</h1>
      <div class="quiz-card">
        <h3>Test your understanding</h3>
        ${questionsHtml}
      </div>
      <div class="lesson-actions">
        <button class="btn-complete ${isDone ? 'done' : ''}" id="quiz-complete-btn" onclick="markQuizComplete(${mod.id})" ${isDone ? '' : 'disabled style="opacity:0.4;cursor:default"'}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            ${isDone ? '<path d="M20 6L9 17l-5-5"/>' : '<circle cx="12" cy="12" r="10"/>'}
          </svg>
          ${isDone ? 'Completed' : 'Answer all questions'}
        </button>
        <div class="nav-group">
          ${prev ? `<button class="btn-nav" onclick='navigateTo(${JSON.stringify(prev)})'>← Prev</button>` : ''}
          ${next ? `<button class="btn-nav primary" onclick='navigateTo(${JSON.stringify(next)})'>Next →</button>` : `<button class="btn-nav primary" onclick='checkCompletion()'>Finish →</button>`}
        </div>
      </div>
    </div>
  `;

  // Wire up quiz option clicks
  const answeredQs = new Set();
  el.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.q);
      if (answeredQs.has(qi)) return;
      answeredQs.add(qi);

      const correct = quiz.questions[qi].correct;
      const oi = parseInt(btn.dataset.o);
      const allOpts = el.querySelectorAll(`.quiz-option[data-q="${qi}"]`);

      allOpts.forEach((o, i) => {
        if (i === oi && i === correct) {
          o.classList.add('correct');
        } else if (i === oi) {
          o.classList.add('incorrect');
        } else {
          o.classList.add('revealed');
          if (i === correct) o.classList.add('correct');
        }
      });

      el.querySelector(`.quiz-explanation[data-qe="${qi}"]`).classList.add('show');

      // Check if all answered
      if (answeredQs.size === quiz.questions.length) {
        const btn2 = document.getElementById('quiz-complete-btn');
        if (btn2 && !progress.quizzes[mod.id]) {
          markQuizComplete(mod.id);
        }
      }
    });
  });
}

function renderScenario(el) {
  const mod = MODULES.find(m => m.id === currentView.moduleId);
  const scenario = mod.scenario;
  const isDone = !!progress.scenarios[mod.id];
  const idx = flatItems.findIndex(i => i.type === 'scenario' && i.moduleId === mod.id);
  const prev = idx > 0 ? flatItems[idx - 1] : null;
  const next = idx < flatItems.length - 1 ? flatItems[idx + 1] : null;

  const optsHtml = scenario.options.map((opt, i) => `
    <button class="scenario-option" data-so="${i}">${opt.text}</button>
  `).join('');

  el.innerHTML = `
    <div class="lesson-content">
      <div class="lesson-module-label">Module ${mod.id}: ${mod.title}</div>
      <h1 class="lesson-title">Scenario Exercise</h1>
      <div class="scenario-card">
        <h3>Workplace Scenario</h3>
        <div class="scenario-situation">${scenario.situation}</div>
        <div class="scenario-prompt">${scenario.prompt}</div>
        <div class="scenario-options">${optsHtml}</div>
        <div class="scenario-explanation"><strong>Best approach:</strong> ${scenario.explanation}</div>
      </div>
      <div class="lesson-actions">
        <button class="btn-complete ${isDone ? 'done' : ''}" id="scenario-complete-btn" onclick="markScenarioComplete(${mod.id})" ${isDone ? '' : 'disabled style="opacity:0.4;cursor:default"'}>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            ${isDone ? '<path d="M20 6L9 17l-5-5"/>' : '<circle cx="12" cy="12" r="10"/>'}
          </svg>
          ${isDone ? 'Completed' : 'Choose an option'}
        </button>
        <div class="nav-group">
          ${prev ? `<button class="btn-nav" onclick='navigateTo(${JSON.stringify(prev)})'>← Prev</button>` : ''}
          ${next ? `<button class="btn-nav primary" onclick='navigateTo(${JSON.stringify(next)})'>Next →</button>` : `<button class="btn-nav primary" onclick='checkCompletion()'>Finish →</button>`}
        </div>
      </div>
    </div>
  `;

  // Wire up scenario clicks
  let answered = false;
  el.querySelectorAll('.scenario-option').forEach((btn, i) => {
    btn.addEventListener('click', () => {
      if (answered) return;
      answered = true;

      el.querySelectorAll('.scenario-option').forEach((o, j) => {
        if (j === i) {
          o.classList.add('selected');
        } else {
          o.classList.add('revealed');
        }
      });

      el.querySelector('.scenario-explanation').classList.add('show');
      markScenarioComplete(mod.id);
    });
  });
}

function renderCompletion(el) {
  el.innerHTML = `
    <div class="lesson-content completion">
      <div class="completion-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
      <h1>Course Complete</h1>
      <p>You've completed Tech Fluency — The Complete Edition. You now have the conceptual vocabulary to understand, discuss, and make decisions about modern software.</p>
      <p>One person can carry an idea all the way to reality. Now you know enough about the machinery to do it.</p>
      <button class="btn-nav primary" onclick="navigateTo({type:'landing'})">Back to overview</button>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════

function toggleComplete(lessonId) {
  if (progress.lessons[lessonId]) {
    delete progress.lessons[lessonId];
  } else {
    progress.lessons[lessonId] = true;
  }
  saveProgress(progress);
  renderContent();
  renderSidebar();
}

function markQuizComplete(moduleId) {
  progress.quizzes[moduleId] = true;
  saveProgress(progress);
  renderSidebar();
  const btn = document.getElementById('quiz-complete-btn');
  if (btn) {
    btn.classList.add('done');
    btn.removeAttribute('disabled');
    btn.style.opacity = '';
    btn.style.cursor = '';
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
      Completed
    `;
  }
}

function markScenarioComplete(moduleId) {
  progress.scenarios[moduleId] = true;
  saveProgress(progress);
  renderSidebar();
  const btn = document.getElementById('scenario-complete-btn');
  if (btn) {
    btn.classList.add('done');
    btn.removeAttribute('disabled');
    btn.style.opacity = '';
    btn.style.cursor = '';
    btn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
      Completed
    `;
  }
}

function findFirstIncomplete() {
  return flatItems.find(i => !isItemComplete(i)) || null;
}

function startOrResume() {
  const item = findFirstIncomplete();
  if (item) {
    navigateTo(item);
  } else {
    navigateTo({ type: 'completion' });
  }
}

function checkCompletion() {
  const { done, total } = getTotalProgress();
  if (done === total) {
    navigateTo({ type: 'completion' });
  } else {
    startOrResume();
  }
}

// ═══════════════════════════════════════════════════════
// MOBILE NAV
// ═══════════════════════════════════════════════════════

document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
});

document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
});

// Keyboard nav
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    if (!currentView || currentView.type === 'landing' || currentView.type === 'completion') return;
    const idx = flatItems.findIndex(i => {
      if (currentView.type === 'lesson') return i.type === 'lesson' && i.lessonId === currentView.lessonId;
      if (currentView.type === 'quiz') return i.type === 'quiz' && i.moduleId === currentView.moduleId;
      if (currentView.type === 'scenario') return i.type === 'scenario' && i.moduleId === currentView.moduleId;
      return false;
    });
    if (idx === -1) return;
    if (e.key === 'ArrowLeft' && idx > 0) navigateTo(flatItems[idx - 1]);
    if (e.key === 'ArrowRight' && idx < flatItems.length - 1) navigateTo(flatItems[idx + 1]);
  }
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

renderSidebar();
navigateTo({ type: 'landing' });

</script>
</body>
